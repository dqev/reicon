<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Premium Clay Button</title>

<style>
  :root {
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --bg: #e6e7ee;
  }

  body {
    margin: 0;
    height: 100vh;
    display: grid;
    place-items: center;
    background: radial-gradient(circle at top left, #f1f2f7, #dcdde5);
    font-family: system-ui, -apple-system, sans-serif;
  }

  .clay-btn {
    position: relative;
    padding: 14px 36px;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: 0.5px;
    color: #fff;
    border: none;
    border-radius: 999px;
    cursor: pointer;

    /* Gradient body for premium feel */
    background: linear-gradient(145deg, var(--primary), var(--primary-dark));

    /* Soft clay shadows */
    box-shadow:
      inset -6px -6px 10px rgba(0,0,0,0.25),
      inset 4px 4px 8px rgba(255,255,255,0.25),
      10px 10px 20px rgba(0,0,0,0.18),
      -6px -6px 12px rgba(255,255,255,0.6);

    transition: 
      transform 0.25s cubic-bezier(.2,.8,.2,1),
      box-shadow 0.25s ease,
      filter 0.2s ease;
  }

  /* Gloss highlight layer */
  .clay-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: linear-gradient(
      120deg,
      rgba(255,255,255,0.5),
      transparent 40%
    );
    opacity: 0.4;
    pointer-events: none;
  }

  /* Hover: lift + sharpen */
  .clay-btn:hover {
    transform: translateY(-4px) scale(1.04);
    box-shadow:
      inset -4px -4px 8px rgba(0,0,0,0.2),
      inset 3px 3px 6px rgba(255,255,255,0.3),
      14px 14px 28px rgba(0,0,0,0.22),
      -8px -8px 16px rgba(255,255,255,0.7);
  }

  /* Active: press */
  .clay-btn:active {
    transform: translateY(2px) scale(0.98);
    box-shadow:
      inset 6px 6px 12px rgba(0,0,0,0.35),
      inset -4px -4px 8px rgba(255,255,255,0.2);
  }

  /* Focus ring (important but often skipped) */
  .clay-btn:focus-visible {
    outline: none;
    box-shadow:
      0 0 0 4px rgba(99,102,241,0.3),
      inset -6px -6px 10px rgba(0,0,0,0.25),
      inset 4px 4px 8px rgba(255,255,255,0.25);
  }
</style>
</head>

<body>

<button class="clay-btn">
  Get Started
</button>

</body>
</html>
